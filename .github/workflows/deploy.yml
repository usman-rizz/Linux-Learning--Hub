name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/monitor-project
            aws s3 cp s3://linux-monitor-logs-yourname-2024/scripts/monitor.sh scripts/monitor.sh
            chmod +x scripts/monitor.sh
            echo "Deployed successfully at $(date)"